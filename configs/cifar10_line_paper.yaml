seed: 7
output_root: outputs/cifar10_line_paper

dataset:
  name: cifar10
  root: data/cifar10
  train: true
  download: true
  image_size: 32
  batch_size: 128
  num_workers: 4

corruption:
  name: diffusion_like
  t_min: 0.05
  t_max: 0.95

model:
  name: tiny_unet
  base_channels: 96
  time_dim: 64
  dropout: 0.0

phi_map:
  type: shallow
  hidden_channels: 32
  spectral_bound: 1.0

loss:
  pred_weight: 1.0
  sem_weight: 0.5
  stab_weight: 1.0e-4

train:
  lr: 2.0e-4
  weight_decay: 0.0
  max_steps: 400
  eval_every: 50
  grad_clip: 1.0
  ema_decay: 0.999
  mixed_precision: false

sweep:
  family: line_x0_u
  num_points: 19
  alpha_min: 0.05
  alpha_max: 0.95
  max_steps_per_target: 120
  seeds: [1, 2, 3, 4]

selection:
  semantic_gap_weight: 0.5
  complexity_weight: 0.05
  candidate_family: scheduled
  schedule_basis_order: 3

eval:
  collapse_threshold: 0.20
  tail_percentiles: [90, 95, 99]
  save_samples: true
  num_eval_batches: 8

logging:
  save_metrics_jsonl: true
  save_summary_json: true
  save_last_eval_json: true
