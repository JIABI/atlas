seed: 7
output_root: outputs/smoke

dataset:
  name: synthetic
  root: data
  channels: 3
  image_size: 32
  num_samples: 64
  batch_size: 8

corruption:
  name: diffusion_like
  t_min: 0.05
  t_max: 0.95

model:
  name: tiny_unet
  base_channels: 8
  time_dim: 8

phi_map:
  type: affine

loss:
  pred_weight: 1.0
  sem_weight: 0.5
  stab_weight: 1.0e-4

train:
  lr: 1.0e-3
  max_steps: 4
  eval_every: 2
  grad_clip: 1.0

sweep:
  family: line_x0_u
  num_points: 11
  max_steps_per_target: 10
  seeds: [1,2]

selection:
  semantic_gap_weight: 0.5
  complexity_weight: 0.05
  candidate_family: scheduled
  schedule_basis_order: 3

eval:
  collapse_threshold: 0.35
  tail_percentiles: [95, 99]

loss_target:
  family: line_x0_u
  alpha: 0.6

manual_prediction_target:
  family: line_x0_r
  alpha: 0.75
