seed: 7
output_root: outputs/ucf101_pilot_paper

dataset:
  name: imagefolder
  root: data/ucf101_frames/train
  image_size: 64
  batch_size: 32
  num_workers: 4
  pin_memory: true

corruption:
  name: diffusion_like
  t_min: 0.05
  t_max: 0.95
  num_time_samples: 8

model:
  name: paper_unet
  base_channels: 96
  time_dim: 128
  channel_mults: [1, 2, 2]
  num_res_blocks: 2
  use_attention: true
  attention_heads: 4
  dropout: 0.0

phi_map:
  type: shallow
  hidden_channels: 32
  spectral_bound: 1.0

loss:
  pred_weight: 1.0
  sem_weight: 0.5
  stab_weight: 5.0e-5
  loss_kind: mse

train:
  lr: 2.0e-4
  weight_decay: 1.0e-4
  max_steps: 3000
  eval_every: 100
  grad_clip: 1.0
  ema_decay: 0.999
  mixed_precision: false
  save_every: 500

loss_target:
  family: line_x0_u
  alpha: 0.85

manual_prediction_target:
  family: line_x0_u
  alpha: 0.25

selection:
  semantic_gap_weight: 0.75
  complexity_weight: 0.10
  candidate_family: scheduled
  schedule_basis_order: 3

eval:
  collapse_threshold: 0.20
  tail_percentiles: [50, 90, 95]
  save_samples: false
  num_eval_batches: 8
