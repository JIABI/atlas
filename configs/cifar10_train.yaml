seed: 20
output_root: outputs/cifar10_train

dataset:
  name: cifar10
  root: data/cifar10
  train: true
  download: true
  image_size: 32
  batch_size: 64

corruption:
  name: diffusion_like
  t_min: 0.05
  t_max: 0.95

model:
  name: tiny_unet
  base_channels: 64
  time_dim: 64

phi_map:
  type: shallow
  hidden_channels: 32

loss:
  pred_weight: 1.0
  sem_weight: 0.7
  stab_weight: 1.0e-4

train:
  lr: 2.0e-4
  max_steps: 400
  eval_every: 100
  grad_clip: 1.0

loss_target:
  family: line_x0_u
  alpha: 0.65

manual_prediction_target:
  family: line_x0_r
  alpha: 0.75

eval:
  collapse_threshold: 0.25
  tail_percentiles: [95, 99]
