seed: 7
output_root: outputs/cifar10_boundary_refine

dataset:
  name: cifar10
  root: data/cifar10
  train: true
  download: true
  image_size: 32
  batch_size: 128
  num_workers: 4
  pin_memory: true

corruption:
  name: diffusion_like
  t_min: 0.05
  t_max: 0.95
  num_time_samples: 8

model:
  name: paper_unet
  base_channels: 96
  time_dim: 128
  channel_mults: [1, 2, 2]
  num_res_blocks: 2
  use_attention: true
  attention_heads: 4
  dropout: 0.0

phi_map:
  type: shallow
  hidden_channels: 32
  spectral_bound: 1.0

loss:
  pred_weight: 1.0
  sem_weight: 0.5
  stab_weight: 1.0e-4
  loss_kind: mse

train:
  lr: 2.0e-4
  weight_decay: 1.0e-4
  max_steps: 500
  eval_every: 50
  grad_clip: 1.0
  ema_decay: 0.999
  mixed_precision: false
  save_every: 100

sweep:
  family: line_x0_u
  custom_alphas: [0.36, 0.38, 0.40, 0.42, 0.44, 0.46, 0.48, 0.50, 0.52, 0.54, 0.56, 0.58, 0.60, 0.62, 0.64, 0.66, 0.68, 0.70, 0.72, 0.74]
  max_steps_per_target: 160
  seeds: [1, 2, 3, 4, 5]

selection:
  semantic_gap_weight: 0.5
  complexity_weight: 0.05
  candidate_family: scheduled
  schedule_basis_order: 3

eval:
  collapse_threshold: 0.20
  tail_percentiles: [50, 90, 95, 99]
  save_samples: true
  num_eval_batches: 8
